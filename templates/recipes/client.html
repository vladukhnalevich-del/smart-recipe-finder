<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recipe Finder</title>
    <link rel="stylesheet" href="/static/css/client.css">
</head>
<body>
    <h1>Smart Recipe Finder</h1>

    <div>
        <span class="tab active" onclick="showTab('search')">Поиск</span>
        <span class="tab" onclick="showTab('all')">Все рецепты</span>
        <span class="tab" onclick="showTab('create')">Создать</span>
        <span class="tab" onclick="showTab('delete')">Удалить</span>
    </div>

    <div id="search-tab" class="tab-content active">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Введите название...">
            <button class="btn btn-search" onclick="searchRecipe()">Найти</button>
        </div>
        <div id="searchResult" class="result"></div>
    </div>

    <div id="all-tab" class="tab-content">
        <button class="btn btn-all" onclick="getAllRecipes()">Показать все</button>
        <div id="allResult" class="result"></div>
    </div>

    <div id="create-tab" class="tab-content">
        <input type="text" id="name" placeholder="Название">
        <textarea id="ingredients" rows="3" placeholder="Ингредиенты (каждый с новой строки)"></textarea>
        <textarea id="instructions" rows="3" placeholder="Инструкции"></textarea>
        <input type="number" id="cooking_time" value="30">

        <select id="cuisine">
            <option value="russian">Русская</option>
            <option value="italian">Итальянская</option>
            <option value="french">Французская</option>
            <option value="chinese">Китайская</option>
            <option value="japanese">Японская</option>
        </select>

        <select id="difficulty">
            <option value="easy">Легко</option>
            <option value="medium">Средняя</option>
            <option value="hard">Сложно</option>
        </select>

        <button class="btn btn-save" onclick="createRecipe()">Сохранить</button>
        <div id="createResult" class="result"></div>
    </div>

    <div id="delete-tab" class="tab-content">
        <div class="delete-box">
            <input type="number" id="deleteId" placeholder="ID рецепта">
            <button class="btn btn-delete" onclick="deleteRecipe()">Удалить</button>
        </div>
        <div id="deleteResult" class="result"></div>
    </div>

    <script src="/static/js/client.js"></script>
</body>
</html>
