<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recipe Finder</title>
    <link rel="stylesheet" href="/static/css/client.css">
</head>
<body>
    <h1>Smart Recipe Finder</h1>

    <div class="tabs">
        <div class="tab active" onclick="showTab('search')">Поиск</div>
        <div class="tab" onclick="showTab('all')">Все рецепты</div>
        <div class="tab" onclick="showTab('create')">Создать</div>
        <div class="tab" onclick="showTab('delete')">Удалить</div>
    </div>

    <div id="search-tab" class="tab-content active">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Введите название рецепта...">
            <button class="btn btn-search" onclick="searchRecipe()">Найти</button>
        </div>
        <div class="result" id="searchResult">
            Введите название рецепта для поиска
        </div>
    </div>

    <div id="all-tab" class="tab-content">
        <button class="btn btn-all" onclick="getAllRecipes()">Показать все рецепты</button>
        <div class="result" id="allResult">
            Нажмите кнопку для просмотра
        </div>
    </div>

    <div id="create-tab" class="tab-content">
        <div class="form-group">
            <label>Название рецепта:</label>
            <input type="text" id="name" placeholder="Например: Борщ">
        </div>

        <div class="form-group">
            <label>Ингредиенты (каждый на новой строке):</label>
            <textarea id="ingredients" rows="4" placeholder="Картошка&#10;Морковь&#10;Лук"></textarea>
        </div>

        <div class="form-group">
            <label>Инструкции приготовления:</label>
            <textarea id="instructions" rows="4" placeholder="1. Нарежьте овощи&#10;2. Сварите бульон"></textarea>
        </div>

        <div class="form-group">
            <label>Время приготовления (минуты):</label>
            <input type="number" id="cooking_time" value="30" min="1">
        </div>

        <div class="form-group">
            <label>Тип кухни:</label>
            <select id="cuisine">
                {% for value, label in cuisine_choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Сложность приготовления:</label>
            <select id="difficulty">
                {% for value, label in difficulty_choices %}
                <option value="{{ value }}" {% if value == 'medium' %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <button class="btn btn-save" onclick="createRecipe()">Сохранить рецепт</button>
        <div class="result" id="createResult"></div>
    </div>

    <div id="delete-tab" class="tab-content">
        <div class="delete-box">
            <input type="number" id="deleteId" placeholder="Введите ID рецепта" min="1">
            <button class="btn btn-delete" onclick="deleteRecipe()">Удалить</button>
        </div>
        <div class="result" id="deleteResult"></div>
    </div>

    <script src="/static/js/client.js"></script>
</body>
</html>
